<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Gerador de Descontos Shopee</title>
<style>
  :root {
    --laranja: #ee4d2d;
    --laranja-escuro: #d73211;
    --fundo: #fff5f2;
    --texto: #2b2b2b;
    --cinza: #6b7280;
    --borda: #f0d9d1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--fundo);
    color: var(--texto);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    width: 100%;
    max-width: 440px;
    border-radius: 20px;
    padding: 32px 26px;
    box-shadow: 0 10px 40px rgba(238, 77, 45, 0.12);
    text-align: center;
  }
  .foto {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 14px;
    border: 3px solid var(--laranja);
    display: block;
  }
  h1 {
    font-size: 20px;
    color: var(--laranja);
    margin-bottom: 4px;
  }
  .sub {
    font-size: 14px;
    color: var(--cinza);
    margin-bottom: 22px;
  }
  .label {
    text-align: left;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    font-size: 15px;
    border: 2px solid var(--borda);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--laranja); }
  button {
    width: 100%;
    margin-top: 14px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: var(--laranja);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: var(--laranja-escuro); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .resultado {
    margin-top: 22px;
    padding: 18px;
    background: var(--fundo);
    border-radius: 12px;
    display: none;
  }
  .resultado.mostrar { display: block; }
  .resultado .link-box {
    word-break: break-all;
    font-size: 14px;
    color: var(--laranja-escuro);
    background: #fff;
    padding: 12px;
    border-radius: 10px;
    border: 1px dashed var(--laranja);
    margin-bottom: 12px;
  }
  .acoes { display: flex; gap: 10px; }
  .acoes a, .acoes .copiar {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
  }
  .acoes a { background: var(--laranja); color: #fff; }
  .acoes .copiar { background: #fff; color: var(--laranja); border: 2px solid var(--laranja); }
  .erro {
    margin-top: 16px;
    color: #b91c1c;
    font-size: 14px;
    display: none;
  }
  .erro.mostrar { display: block; }
  .passos {
    margin-top: 26px;
    text-align: left;
    font-size: 14px;
    color: var(--cinza);
    line-height: 1.9;
  }
  .passos h3 { font-size: 15px; color: var(--texto); margin-bottom: 8px; }
</style>
</head>
<body>
  <div class="card">
    <!-- Troque a foto pelo arquivo da sua esposa (foto.jpg) -->
    <img src="foto.jpg" alt="Foto" class="foto" onerror="this.style.display='none'">
    <h1>Gerador de Descontos Shopee</h1>
    <p class="sub">Cupom exclusivo • cole seu link e ganhe desconto</p>

    <label class="label" for="link">Link do produto na Shopee</label>
    <input type="text" id="link" placeholder="Cole aqui o link do produto...">
    <button id="btn" onclick="converter()">💰 Gerar link com desconto</button>

    <div class="erro" id="erro"></div>

    <div class="resultado" id="resultado">
      <div class="link-box" id="linkBox"></div>
      <div class="acoes">
        <a id="abrir" href="#" target="_blank">Abrir produto</a>
        <span class="copiar" onclick="copiar()">Copiar link</span>
      </div>
    </div>

    <div class="passos">
      <h3>📋 Como funciona?</h3>
      1️⃣ Copie o link do produto na Shopee<br>
      2️⃣ Cole o link no campo acima<br>
      3️⃣ Clique em "Gerar link com desconto"<br>
      4️⃣ Abra o produto — o cupom aparece no carrinho
    </div>
  </div>

<script>
  async function converter() {
    const link = document.getElementById("link").value.trim();
    const btn = document.getElementById("btn");
    const erro = document.getElementById("erro");
    const resultado = document.getElementById("resultado");

    erro.classList.remove("mostrar");
    resultado.classList.remove("mostrar");

    if (!link) {
      erro.textContent = "Cole o link do produto primeiro.";
      erro.classList.add("mostrar");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Gerando...";

    try {
      const resp = await fetch("/api/converter", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ link: link }),
      });
      const dados = await resp.json();

      if (!resp.ok || dados.erro) {
        erro.textContent = dados.erro || "Algo deu errado. Tente de novo.";
        erro.classList.add("mostrar");
      } else {
        document.getElementById("linkBox").textContent = dados.link;
        document.getElementById("abrir").href = dados.link;
        resultado.classList.add("mostrar");
      }
    } catch (e) {
      erro.textContent = "Erro de conexão. Tente novamente.";
      erro.classList.add("mostrar");
    }

    btn.disabled = false;
    btn.textContent = "💰 Gerar link com desconto";
  }

  function copiar() {
    const texto = document.getElementById("linkBox").textContent;
    navigator.clipboard.writeText(texto);
    const btn = document.querySelector(".copiar");
    const original = btn.textContent;
    btn.textContent = "Copiado! ✓";
    setTimeout(() => { btn.textContent = original; }, 1500);
  }

  // Permite gerar apertando Enter
  document.getElementById("link").addEventListener("keypress", function(e) {
    if (e.key === "Enter") converter();
  });
</script>
</body>
</html>
